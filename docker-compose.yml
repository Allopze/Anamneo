services:
  postgres:
    image: postgres:16-alpine
    container_name: anamneo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anamneo}
      POSTGRES_USER: ${POSTGRES_USER:-anamneo_owner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      ANAMNEO_APP_DB_PASSWORD: ${ANAMNEO_APP_DB_PASSWORD:?ANAMNEO_APP_DB_PASSWORD is required}
      ANAMNEO_MONITOR_DB_PASSWORD: ${ANAMNEO_MONITOR_DB_PASSWORD:-change-me-before-production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: anamneo-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ANAMNEO_DEPLOYMENT_SCOPE: ${ANAMNEO_DEPLOYMENT_SCOPE:?ANAMNEO_DEPLOYMENT_SCOPE=single-clinic is required}
      DATABASE_URL: ${DATABASE_URL:-postgresql://anamneo_app:${ANAMNEO_APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-anamneo}?schema=public&connection_limit=10&pool_timeout=10}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:-postgresql://${POSTGRES_USER:-anamneo_owner}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anamneo}?schema=public}
      PG_BACKUP_DIR: /app/data/backups
      PG_BACKUP_RETENTION_DAYS: ${PG_BACKUP_RETENTION_DAYS:-14}
      PG_BACKUP_MAX_AGE_HOURS: ${PG_BACKUP_MAX_AGE_HOURS:-24}
      PG_RESTORE_DRILL_FREQUENCY_DAYS: ${PG_RESTORE_DRILL_FREQUENCY_DAYS:-7}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:?BOOTSTRAP_TOKEN is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 5679
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      UPLOAD_DEST: /app/uploads
      UPLOAD_MAX_SIZE: ${UPLOAD_MAX_SIZE:-10485760}
      ENCRYPTION_AT_REST_CONFIRMED: ${ENCRYPTION_AT_REST_CONFIRMED:?ENCRYPTION_AT_REST_CONFIRMED is required}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:?SETTINGS_ENCRYPTION_KEY is required}
      SETTINGS_ENCRYPTION_KEYS: ${SETTINGS_ENCRYPTION_KEYS:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (64 hex chars, encrypts clinical sections)}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?APP_PUBLIC_URL is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Anamneo}
      INVITATION_EMAIL_SUBJECT: ${INVITATION_EMAIL_SUBJECT:-Invitacion a {{clinicName}}}
      SENTRY_DSN: ${SENTRY_DSN:-}
      METRICS_SCRAPE_TOKEN: ${METRICS_SCRAPE_TOKEN:-}
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-5679}:5679"
    volumes:
      - ./runtime/data:/app/data
      - ./runtime/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5679/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        API_PROXY_TARGET: http://backend:5679/api
        NEXT_PUBLIC_FORCE_SHARED_DEVICE_MODE: ${NEXT_PUBLIC_FORCE_SHARED_DEVICE_MODE:-true}
    container_name: anamneo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      API_PROXY_TARGET: http://backend:5679/api
      NEXT_PUBLIC_FORCE_SHARED_DEVICE_MODE: ${NEXT_PUBLIC_FORCE_SHARED_DEVICE_MODE:-true}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      PORT: 5556
      HOSTNAME: "0.0.0.0"
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_PORT:-5556}:5556"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5556"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  backup-cron:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: anamneo-backup-cron
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      ANAMNEO_DEPLOYMENT_SCOPE: ${ANAMNEO_DEPLOYMENT_SCOPE:?ANAMNEO_DEPLOYMENT_SCOPE=single-clinic is required}
      DATABASE_URL: ${DATABASE_URL:-postgresql://anamneo_app:${ANAMNEO_APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-anamneo}?schema=public&connection_limit=10&pool_timeout=10}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:-postgresql://${POSTGRES_USER:-anamneo_owner}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anamneo}?schema=public}
      PG_BACKUP_DIR: /app/data/backups
      PG_BACKUP_RETENTION_DAYS: ${PG_BACKUP_RETENTION_DAYS:-14}
      PG_BACKUP_MAX_AGE_HOURS: ${PG_BACKUP_MAX_AGE_HOURS:-24}
      PG_RESTORE_DRILL_FREQUENCY_DAYS: ${PG_RESTORE_DRILL_FREQUENCY_DAYS:-7}
      PG_NOTIFY_POLICY: ${PG_NOTIFY_POLICY:-on-failure}
      PG_ALERT_SERVICE_NAME: ${PG_ALERT_SERVICE_NAME:-anamneo-backend}
      PG_ALERT_WEBHOOK_URL: ${PG_ALERT_WEBHOOK_URL:-}
      UPLOAD_DEST: /app/uploads
      ATTACHMENT_SOFT_DELETE_RETENTION_DAYS: ${ATTACHMENT_SOFT_DELETE_RETENTION_DAYS:-30}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 */6 * * *}
      # Copia off-machine (opcional). Vacío = desactivada. Para activarla: define
      # PG_BACKUP_MIRROR_DIR=/app/data/backups-mirror y apunta PG_BACKUP_MIRROR_HOST_DIR
      # (abajo) a un disco externo o carpeta sincronizada a nube.
      PG_BACKUP_MIRROR_DIR: ${PG_BACKUP_MIRROR_DIR:-}
      PG_BACKUP_MIRROR_RETENTION_DAYS: ${PG_BACKUP_MIRROR_RETENTION_DAYS:-14}
    volumes:
      - ./runtime/data:/app/data
      - ./runtime/uploads:/app/uploads
      # Destino de la copia off-machine. Por defecto apunta al mismo disco (placeholder);
      # cambia PG_BACKUP_MIRROR_HOST_DIR a la ruta de tu disco externo / carpeta nube.
      - ${PG_BACKUP_MIRROR_HOST_DIR:-./runtime/data/backups-mirror}:/app/data/backups-mirror
    entrypoint: ["sh", "-c"]
    command:
      - |
        mkdir -p /tmp/crontabs
        echo "$$BACKUP_CRON_SCHEDULE node /app/scripts/pg-ops-runner.js --mode=all --notify=on-failure && node /app/scripts/purge-deleted-attachments.js && node /app/scripts/purge-password-reset-tokens.js >> /proc/1/fd/1 2>&1" > /tmp/crontabs/node
        echo "Backup cron started: $$BACKUP_CRON_SCHEDULE (ops-runner: backup + restore-drill + monitor)"
        node /app/scripts/pg-ops-runner.js --mode=all --notify=on-failure
        node /app/scripts/purge-deleted-attachments.js
        node /app/scripts/purge-password-reset-tokens.js
        crond -f -l 2 -c /tmp/crontabs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: anamneo-prometheus
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      METRICS_SCRAPE_TOKEN: ${METRICS_SCRAPE_TOKEN:-}
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_BIND_HOST:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  loki:
    image: grafana/loki:3.0.0
    container_name: anamneo-loki
    restart: unless-stopped
    volumes:
      - ./infra/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_BIND_HOST:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  log-shipper:
    image: grafana/promtail:3.0.0
    container_name: anamneo-promtail
    restart: unless-stopped
    depends_on:
      - loki
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail-positions:/tmp
    command: -config.file=/etc/promtail/config.yml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  grafana:
    image: grafana/grafana:12.0.0
    container_name: anamneo-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-before-production}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_BIND_HOST:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres-data:
  prometheus-data:
  loki-data:
  promtail-positions:
  grafana-data:
