version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anamneo-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ALLOW_SQLITE_IN_PRODUCTION: ${ALLOW_SQLITE_IN_PRODUCTION:-false}
      SQLITE_SYNCHRONOUS: ${SQLITE_SYNCHRONOUS:-NORMAL}
      SQLITE_BUSY_TIMEOUT_MS: ${SQLITE_BUSY_TIMEOUT_MS:-5000}
      SQLITE_WAL_AUTOCHECKPOINT_PAGES: ${SQLITE_WAL_AUTOCHECKPOINT_PAGES:-1000}
      SQLITE_BACKUP_DIR: ${SQLITE_BACKUP_DIR:-/app/data/backups}
      SQLITE_BACKUP_RETENTION_DAYS: ${SQLITE_BACKUP_RETENTION_DAYS:-14}
      SQLITE_BACKUP_MAX_AGE_HOURS: ${SQLITE_BACKUP_MAX_AGE_HOURS:-24}
      SQLITE_WAL_WARN_SIZE_MB: ${SQLITE_WAL_WARN_SIZE_MB:-128}
      SQLITE_RESTORE_DRILL_FREQUENCY_DAYS: ${SQLITE_RESTORE_DRILL_FREQUENCY_DAYS:-7}
      SQLITE_NOTIFY_POLICY: ${SQLITE_NOTIFY_POLICY:-on-failure}
      SQLITE_ALERT_SERVICE_NAME: ${SQLITE_ALERT_SERVICE_NAME:-anamneo-backend}
      SQLITE_ALERT_WEBHOOK_URL: ${SQLITE_ALERT_WEBHOOK_URL:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 5678
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      UPLOAD_DEST: ${UPLOAD_DEST:-/app/uploads}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "5678:5678"
    volumes:
      - db_data:/app/data
      - uploads_data:/app/uploads
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:5678/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5678/api
    container_name: anamneo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      PORT: 5555
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5555"]
      interval: 30s
      timeout: 10s
      retries: 3

  backup-cron:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anamneo-backup-cron
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ALLOW_SQLITE_IN_PRODUCTION: ${ALLOW_SQLITE_IN_PRODUCTION:-false}
      SQLITE_BACKUP_DIR: /app/data/backups
      SQLITE_BACKUP_RETENTION_DAYS: ${SQLITE_BACKUP_RETENTION_DAYS:-14}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 */6 * * *}
      UPLOAD_DEST: ${UPLOAD_DEST:-/app/uploads}
    volumes:
      - db_data:/app/data
      - uploads_data:/app/uploads
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "$$BACKUP_CRON_SCHEDULE node /app/scripts/sqlite-backup.js >> /proc/1/fd/1 2>&1" > /tmp/crontab
        crontab /tmp/crontab
        echo "Backup cron started: $$BACKUP_CRON_SCHEDULE"
        node /app/scripts/sqlite-backup.js
        crond -f -l 2

volumes:
  db_data:
  uploads_data:
