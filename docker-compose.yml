services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: anamneo-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/anamneo.db
      ALLOW_SQLITE_IN_PRODUCTION: "true"
      SQLITE_SYNCHRONOUS: ${SQLITE_SYNCHRONOUS:-NORMAL}
      SQLITE_BUSY_TIMEOUT_MS: ${SQLITE_BUSY_TIMEOUT_MS:-5000}
      SQLITE_WAL_AUTOCHECKPOINT_PAGES: ${SQLITE_WAL_AUTOCHECKPOINT_PAGES:-1000}
      SQLITE_BACKUP_DIR: /app/data/backups
      SQLITE_BACKUP_RETENTION_DAYS: ${SQLITE_BACKUP_RETENTION_DAYS:-14}
      SQLITE_BACKUP_MAX_AGE_HOURS: ${SQLITE_BACKUP_MAX_AGE_HOURS:-24}
      SQLITE_WAL_WARN_SIZE_MB: ${SQLITE_WAL_WARN_SIZE_MB:-128}
      SQLITE_RESTORE_DRILL_FREQUENCY_DAYS: ${SQLITE_RESTORE_DRILL_FREQUENCY_DAYS:-7}
      SQLITE_NOTIFY_POLICY: ${SQLITE_NOTIFY_POLICY:-on-failure}
      SQLITE_ALERT_SERVICE_NAME: ${SQLITE_ALERT_SERVICE_NAME:-anamneo-backend}
      SQLITE_ALERT_WEBHOOK_URL: ${SQLITE_ALERT_WEBHOOK_URL:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:?BOOTSTRAP_TOKEN is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 5679
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      UPLOAD_DEST: /app/uploads
      UPLOAD_MAX_SIZE: ${UPLOAD_MAX_SIZE:-10485760}
      ENCRYPTION_AT_REST_CONFIRMED: ${ENCRYPTION_AT_REST_CONFIRMED:?ENCRYPTION_AT_REST_CONFIRMED is required}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:?SETTINGS_ENCRYPTION_KEY is required}
      SETTINGS_ENCRYPTION_KEYS: ${SETTINGS_ENCRYPTION_KEYS:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?APP_PUBLIC_URL is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Anamneo}
      INVITATION_EMAIL_SUBJECT: ${INVITATION_EMAIL_SUBJECT:-Invitacion a {{clinicName}}}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-5679}:5679"
    volumes:
      - ./runtime/data:/app/data
      - ./runtime/uploads:/app/uploads
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5679/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        API_PROXY_TARGET: http://backend:5679/api
        NEXT_PUBLIC_FORCE_SHARED_DEVICE_MODE: ${NEXT_PUBLIC_FORCE_SHARED_DEVICE_MODE:-false}
    container_name: anamneo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      API_PROXY_TARGET: http://backend:5679/api
      NEXT_PUBLIC_FORCE_SHARED_DEVICE_MODE: ${NEXT_PUBLIC_FORCE_SHARED_DEVICE_MODE:-false}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      PORT: 5556
      HOSTNAME: "0.0.0.0"
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_PORT:-5556}:5556"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5556"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backup-cron:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: anamneo-backup-cron
    restart: unless-stopped
    user: root
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/anamneo.db
      ALLOW_SQLITE_IN_PRODUCTION: "true"
      SQLITE_BACKUP_DIR: /app/data/backups
      SQLITE_BACKUP_RETENTION_DAYS: ${SQLITE_BACKUP_RETENTION_DAYS:-14}
      UPLOAD_DEST: /app/uploads
      ATTACHMENT_SOFT_DELETE_RETENTION_DAYS: ${ATTACHMENT_SOFT_DELETE_RETENTION_DAYS:-30}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 */6 * * *}
    volumes:
      - ./runtime/data:/app/data
      - ./runtime/uploads:/app/uploads
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "$$BACKUP_CRON_SCHEDULE node /app/scripts/sqlite-ops-runner.js --mode=all --notify=on-failure && node /app/scripts/purge-deleted-attachments.js >> /proc/1/fd/1 2>&1" > /tmp/crontab
        crontab /tmp/crontab
        echo "Backup cron started: $$BACKUP_CRON_SCHEDULE (ops-runner: backup + restore-drill + monitor)"
        node /app/scripts/sqlite-ops-runner.js --mode=all --notify=on-failure
        node /app/scripts/purge-deleted-attachments.js
        crond -f -l 2
