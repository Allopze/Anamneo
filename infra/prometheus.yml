global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: anamneo-backend
    metrics_path: /api/metrics
    scheme: http
    authorization:
      type: Bearer
      credentials: ${METRICS_SCRAPE_TOKEN}
    static_configs:
      - targets:
          - backend:5679
        labels:
          service: anamneo-backend
