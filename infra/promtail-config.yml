server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-anamneo
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /anamneo-(backend|frontend|backup-cron|prometheus|grafana|loki)
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      - docker: {}
      - replace:
          expression: '([[:alnum:]._%+-]+)@([[:alnum:].-]+)\.([[:alpha:]]{2,})'
          replace: '[email-redacted]'
      - replace:
          expression: '\b[0-9]{1,2}\.?[0-9]{3}\.?[0-9]{3}-?[0-9Kk]\b'
          replace: '[rut-redacted]'
      - replace:
          expression: '\b[0-9]{10,}\b'
          replace: '[digits-redacted]'
