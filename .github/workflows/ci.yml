name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  root-security:
    name: Root Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root)
        run: npm ci --ignore-scripts

      - name: Audit root dependencies
        run: npm audit --audit-level=high

  backend:
    name: Backend Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fail on tracked local env or SQLite artifacts
        run: |
          tracked_sensitive=$(git ls-files \
            'backend/.env' \
            'frontend/.env' \
            'backend/prisma/*.db*' \
            'backend/prisma/**/*.db*' \
            'backend/prisma/**/*.bak' \
            'backend/prisma/backups/**')
          if [ -n "$tracked_sensitive" ]; then
            echo "Tracked sensitive/runtime artifacts detected:"
            echo "$tracked_sensitive"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: backend

      - name: Lint (backend)
        run: npm run lint:check
        working-directory: backend

      - name: Typecheck (backend)
        run: npm run typecheck
        working-directory: backend

      - name: Audit production deps (backend)
        run: npm run audit:prod
        working-directory: backend

      - name: Run tests
        run: npm test -- --ci --coverage 2>&1 | tee backend-test.log
        working-directory: backend

      - name: Fail on parseStoredJson warning regressions
        run: |
          if rg -n "Failed to parse/decrypt stored JSON|parseStoredJson" backend-test.log; then
            echo "Unexpected parseStoredJson warning detected during backend tests"
            exit 1
          fi
        working-directory: backend

      - name: Run e2e tests
        run: npm run test:e2e -- --runInBand
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fail on tracked local env or SQLite artifacts
        run: |
          tracked_sensitive=$(git ls-files \
            'backend/.env' \
            'frontend/.env' \
            'backend/prisma/*.db*' \
            'backend/prisma/**/*.db*' \
            'backend/prisma/**/*.bak' \
            'backend/prisma/backups/**')
          if [ -n "$tracked_sensitive" ]; then
            echo "Tracked sensitive/runtime artifacts detected:"
            echo "$tracked_sensitive"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (frontend)
        run: npm run lint
        working-directory: frontend

      - name: Typecheck (frontend)
        run: npm run typecheck
        working-directory: frontend

      - name: Run tests (frontend)
        run: npm test -- --ci --runInBand
        working-directory: frontend

      - name: Audit production deps (frontend)
        run: npm run audit:prod
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  frontend-e2e:
    name: Frontend E2E Clinical Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: backend

      - name: Build backend for Playwright webServer
        run: npm run build
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright smoke auth flow
        run: npm run test:e2e:smoke
        working-directory: frontend

      - name: Run Playwright clinical workflow
        run: npm run test:e2e:workflow-clinical
        working-directory: frontend

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            frontend/test-results
            frontend/playwright-report
