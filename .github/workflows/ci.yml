name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fail on tracked local env or SQLite artifacts
        run: |
          tracked_sensitive=$(git ls-files \
            'backend/.env' \
            'frontend/.env' \
            'backend/prisma/*.db*' \
            'backend/prisma/**/*.db*' \
            'backend/prisma/**/*.bak' \
            'backend/prisma/backups/**')
          if [ -n "$tracked_sensitive" ]; then
            echo "Tracked sensitive/runtime artifacts detected:"
            echo "$tracked_sensitive"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: backend

      - name: Lint (backend)
        run: npm run lint:check
        working-directory: backend

      - name: Typecheck (backend)
        run: npm run typecheck
        working-directory: backend

      - name: Audit production deps (backend)
        run: npm run audit:prod
        working-directory: backend

      - name: Run tests
        run: npm test -- --ci --coverage
        working-directory: backend

      - name: Run e2e tests
        run: npm run test:e2e -- --runInBand
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fail on tracked local env or SQLite artifacts
        run: |
          tracked_sensitive=$(git ls-files \
            'backend/.env' \
            'frontend/.env' \
            'backend/prisma/*.db*' \
            'backend/prisma/**/*.db*' \
            'backend/prisma/**/*.bak' \
            'backend/prisma/backups/**')
          if [ -n "$tracked_sensitive" ]; then
            echo "Tracked sensitive/runtime artifacts detected:"
            echo "$tracked_sensitive"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (frontend)
        run: npm run lint
        working-directory: frontend

      - name: Typecheck (frontend)
        run: npm run typecheck
        working-directory: frontend

      - name: Run tests (frontend)
        run: npm test -- --ci --runInBand
        working-directory: frontend

      - name: Audit production deps (frontend)
        run: npm run audit:prod
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
